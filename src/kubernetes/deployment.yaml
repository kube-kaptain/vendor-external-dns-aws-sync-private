# Source: external-dns/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-external-dns-aws-sync-private
  namespace: ${Environment}
  labels:
    app.kubernetes.io/name: vendor-external-dns-aws-sync-private
    app.kubernetes.io/instance: vendor-external-dns-aws-sync-private
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: vendor-external-dns-aws-sync-private
    app.kubernetes.io/part-of: ${ProductName}
    kaptain.org/environment: ${Environment}
    kaptain.org/product: ${ProductName}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  annotations:
    kaptain.org/helm-upstream-chart: external-dns-1.21.1
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-external-dns-aws-sync-private
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${ProjectName}
      app.kubernetes.io/instance: vendor-external-dns-aws-sync-private
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${ProjectName}
        app.kubernetes.io/instance: vendor-external-dns-aws-sync-private
    spec:
      automountServiceAccountToken: true
      serviceAccountName: vendor-external-dns-aws-sync-private
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-dns
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          image: ${VendorExternalDnsAwsSyncPrivate/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTagExternalDns}
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=${VendorExternalDnsAwsSyncPrivate/LogLevel}
            - --log-format=${VendorExternalDnsAwsSyncPrivate/LogFormat}
            - --interval=${VendorExternalDnsAwsSyncPrivate/Interval}
            - --source=service
            - --source=ingress
            - --source=crd
            - --policy=sync
            - --registry=txt
            - --txt-owner-id=${ProjectName}
            - --managed-record-types=A
            - --managed-record-types=AAAA
            - --managed-record-types=CNAME
            - --managed-record-types=MX
            - --managed-record-types=NS
            - --managed-record-types=PTR
            - --managed-record-types=SRV
            - --managed-record-types=TXT
            - --provider=aws
            - --aws-zone-type=private
            - --txt-prefix=_${ProjectName}.
            - ${VendorExternalDnsAwsSyncPrivate/EventsFlag}
            - --min-event-sync-interval=${VendorExternalDnsAwsSyncPrivate/MinEventSyncInterval}
            - --aws-zones-cache-duration=${VendorExternalDnsAwsSyncPrivate/AwsZonesCacheDuration}
            - --aws-evaluate-target-health
            - --min-ttl=${VendorExternalDnsAwsSyncPrivate/MinTtl}
            - --namespace=${VendorExternalDnsAwsSyncPrivate/Namespace}
            - --annotation-filter=${VendorExternalDnsAwsSyncPrivate/AnnotationFilter}
          ports:
            - name: http
              protocol: TCP
              containerPort: 7979
          livenessProbe:
            failureThreshold: ${VendorExternalDnsAwsSyncPrivate/ProbeLivenessFailureThreshold}
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeLivenessPeriod}
            timeoutSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeTimeoutSeconds}
          readinessProbe:
            failureThreshold: ${VendorExternalDnsAwsSyncPrivate/ProbeReadinessFailureThreshold}
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeReadinessPeriod}
            successThreshold: ${VendorExternalDnsAwsSyncPrivate/ProbeReadinessSuccessThreshold}
            timeoutSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeTimeoutSeconds}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeStartupPeriod}
            timeoutSeconds: ${VendorExternalDnsAwsSyncPrivate/ProbeTimeoutSeconds}
            failureThreshold: ${VendorExternalDnsAwsSyncPrivate/ProbeStartupFailureThreshold}
          resources:
            requests:
              cpu: "${VendorExternalDnsAwsSyncPrivate/CpuRequest}"
              memory: "${VendorExternalDnsAwsSyncPrivate/Memory}"
            limits:
              memory: "${VendorExternalDnsAwsSyncPrivate/Memory}"
          env:
            - name: GOMEMLIMIT
              value: ${VendorExternalDnsAwsSyncPrivate/GoMemLimit}
